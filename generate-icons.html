<!DOCTYPE html>
<html>
<head>
    <title>Generate Real PWA Icons</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .icon-preview { display: inline-block; margin: 10px; text-align: center; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .icon-preview img { display: block; margin-bottom: 5px; }
        .icon-preview label { font-size: 12px; color: #666; }
        .download-btn { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
        .download-btn:hover { background: #2563eb; }
        h1 { color: #3b82f6; text-align: center; margin-bottom: 30px; }
        .instructions { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 RoadRescue PWA Icon Generator</h1>
        
        <div class="instructions">
            <h3>📋 Instructions:</h3>
            <ol>
                <li>Right-click on each icon below and select "Save image as..."</li>
                <li>Save them to <code>/public/icons/</code> directory</li>
                <li>Refresh your browser to see PWA install prompt</li>
            </ol>
            <p><strong>Required sizes:</strong> 144x144px minimum, 192x192px recommended</p>
        </div>

        <div id="icons-container"></div>
    </div>

    <script>
        function createIcon(size, filename) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Create blue gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#60a5fa'); // Light blue
            gradient.addColorStop(1, '#3b82f6'); // Dark blue
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Add white rounded border
            ctx.strokeStyle = 'white';
            ctx.lineWidth = size * 0.05;
            ctx.beginPath();
            ctx.roundRect(size * 0.1, size * 0.1, size * 0.8, size * 0.8, size * 0.15);
            ctx.stroke();
            
            // Add car emoji or text
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.4}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🚗', size/2, size/2);
            
            // Create container with preview and download
            const container = document.createElement('div');
            container.className = 'icon-preview';
            
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.width = Math.min(size, 100);
            img.height = Math.min(size, 100);
            
            const label = document.createElement('label');
            label.textContent = `${filename} (${size}x${size})`;
            
            container.appendChild(img);
            container.appendChild(label);
            container.appendChild(document.createElement('br'));
            
            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'download-btn';
            downloadBtn.textContent = `Download ${filename}`;
            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            
            container.appendChild(downloadBtn);
            document.getElementById('icons-container').appendChild(container);
        }
        
        // Create icons with minimum required sizes
        const iconSizes = [
            [144, 'icon-144x144.png'],
            [192, 'icon-192x192.png'],
            [512, 'icon-512x512.png']
        ];
        
        iconSizes.forEach(([size, filename]) => createIcon(size, filename));
        
        // Add Canvas roundRect polyfill for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                if (width < 2 * radius) radius = width / 2;
                if (height < 2 * radius) radius = height / 2;
                this.beginPath();
                this.moveTo(x + radius, y);
                this.arcTo(x + width, y, x + width, y + height, radius);
                this.arcTo(x + width, y + height, x, y + height, radius);
                this.arcTo(x, y + height, x, y, radius);
                this.arcTo(x, y, x + width, y, radius);
                this.closePath();
                return this;
            };
        }
    </script>
</body>
</html>

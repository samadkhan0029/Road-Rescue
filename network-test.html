<!DOCTYPE html>
<html>
<head>
    <title>Network Test</title>
</head>
<body>
    <h1>Network Connectivity Test</h1>
    <button onclick="testConnection()">Test Backend Connection</button>
    <div id="results"></div>
    
    <script>
        async function testConnection() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Testing connection...</p>';
            
            try {
                console.log('Testing connection to http://localhost:5001/api/health');
                
                const response = await fetch('http://localhost:5001/api/health', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                results.innerHTML = `
                    <p><strong>✅ Connection Successful!</strong></p>
                    <p>Status: ${response.status}</p>
                    <p>Data: ${JSON.stringify(data)}</p>
                `;
                
            } catch (error) {
                console.error('Connection failed:', error);
                console.error('Error details:', {
                    message: error.message,
                    stack: error.stack,
                    response: error.response,
                    status: error.status,
                    type: error.type
                });
                
                results.innerHTML = `
                    <p><strong>❌ Connection Failed!</strong></p>
                    <p>Error: ${error.message}</p>
                    <p>Type: ${error.type || 'Unknown'}</p>
                    <p>Stack: ${error.stack}</p>
                `;
            }
        }
    </script>
</body>
</html>
